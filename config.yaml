# config.yaml — Commercial Portfolio Monitor (SBA real data)
#
# All tunable thresholds and business parameters live here. Analytical modules
# load this file at runtime via src/config.py:load_config().
#
# To use a custom config:
#   python scripts/run_pipeline.py --config path/to/my_config.yaml
#
# Sections:
#   universe       — which loans count as the monitored portfolio
#   size_bands     — gross-approval size buckets ($) for segmentation
#   concentration  — top-N reporting depth and HHI classification bounds
#   vintage        — months-on-book grid for cumulative charge-off cohort curves
#   early_warning  — rules that flag elevated-risk segments vs the portfolio average

# ---------------------------------------------------------------------------
# UNIVERSE — defining the monitored portfolio
# ---------------------------------------------------------------------------
# SBA 7(a) is outcome-level loan data (one row per loan, final status), not a
# monthly grade panel. We monitor *disbursed* loans with a known outcome.
universe:
  # Statuses excluded entirely — these loans never funded, so they carry no
  # real exposure and would distort both concentration and charge-off rates.
  exclude_statuses: ["CANCLD", "COMMIT"]

  # Statuses treated as DEFAULT (charge-off). Per the build spec the default
  # definition is LoanStatus == CHGOFF. Kept as a list so it is easy to extend.
  #
  # CAVEAT (APS 220 para 79): charge-off is a *lagging* write-off point, NOT the
  # APS 220 reference default (90+ days past due / unlikely-to-pay). It is kept
  # for the realised-loss analytics, but the problem-exposure statuses below are
  # the forward-looking / pre-charge-off signals used for early action.
  default_statuses: ["CHGOFF"]

  # Pre-charge-off PROBLEM-EXPOSURE statuses (APS 220 para 79 / APG 220 para 66).
  # These are NOT counted as default, but they are the early-warning pipeline:
  #   DELINQ  — delinquent
  #   PSTDUE  — past due
  #   LIQUID  — in liquidation (a near-certain future charge-off; leading signal)
  # Surfaced as a problem-exposure layer feeding the early-warning dashboard.
  problem_exposure_statuses: ["DELINQ", "PSTDUE", "LIQUID"]

  # Approval fiscal years considered "fully seasoned" — old enough that loan
  # outcomes are essentially final. Vintages after this are still shown but
  # clearly labelled as not fully seasoned (recent cohorts under-report
  # ultimate charge-offs because some loans have not yet failed).
  fully_seasoned_max_fy: 2015

# ---------------------------------------------------------------------------
# SIZE BANDS — gross-approval ($) buckets for size-based segmentation
# ---------------------------------------------------------------------------
# Edges are upper bounds in USD; the final band is open-ended. Labels are used
# verbatim in output tables and charts.
size_bands:
  edges:   [50000, 150000, 350000, 1000000, 2000000]
  labels:  ["<=50k", "50k-150k", "150k-350k", "350k-1m", "1m-2m", ">2m"]

# ---------------------------------------------------------------------------
# CONCENTRATION — reporting depth and HHI classification
# ---------------------------------------------------------------------------
concentration:
  top_n: 10              # Number of rows to show in each top-N concentration table.

  # HHI = sum of squared segment shares. 0 = perfectly diversified,
  # 1.0 = everything in one segment. Thresholds below classify the score.
  # (For reference, US DOJ merger guidance calls a market >0.25 "highly
  #  concentrated"; loan portfolios are typically far more diversified, so
  #  these bounds are tuned for a many-segment lending book.)
  hhi_moderate_threshold: 0.10   # HHI >= 0.10 -> "Moderate" concentration.
  hhi_high_threshold: 0.18       # HHI >= 0.18 -> "High" concentration.

# ---------------------------------------------------------------------------
# VINTAGE — cumulative charge-off cohort curves
# ---------------------------------------------------------------------------
vintage:
  # Months-since-approval checkpoints at which the cumulative charge-off rate
  # is measured for each approval-year cohort (ChargeOffDate - ApprovalDate).
  mob_grid: [6, 12, 18, 24, 36, 48, 60, 72, 84, 96, 120]

  # Early-MOB checkpoint (months) for the leading vintage-over-vintage view: is
  # a young cohort charging off faster than its predecessors did at the same
  # age? Used by CML-4 (leading view) and the CML-2 vintage-deterioration limit.
  early_mob_reference: 24

# ---------------------------------------------------------------------------
# EARLY WARNING — elevated-risk segment flags
# ---------------------------------------------------------------------------
# A segment (industry x vintage x size band) is flagged when its charge-off
# rate is materially above the portfolio average AND it is large enough to be
# statistically meaningful (avoids flagging a 3-loan segment with one default).
early_warning:
  elevated_multiple: 1.5    # Flag if segment charge-off rate >= 1.5x portfolio avg.
  high_multiple: 2.0        # "High" severity if >= 2.0x portfolio average.
  min_segment_loans: 200    # Minimum loans in a segment to be eligible for a flag.

# ---------------------------------------------------------------------------
# RISK APPETITE & LIMITS (CML-2) — the governance layer
# ---------------------------------------------------------------------------
# APS 220 para 20 (risk appetite statement) + para 35 (concentration limits by
# industry, geography and single name / lender). Each limit turns a descriptive
# threshold into an appetite statement with an amber (early-warning) and red
# (breach) bound, an owner, a defined breach action and a review cycle. These
# drive the RAG board dashboard (CML-3) and the stress scenario (CML-5).
#
# `basis` names the metric the monitor computes from the book (see
# src/risk_appetite.py:_metric_values). `direction: upper` means a breach is
# value >= threshold (most limits); `lower` would breach when value <= threshold.
risk_appetite:
  default_owner: "Head of Credit Risk"
  default_review_cycle: "Quarterly"
  limits:
    - id: industry_hhi
      metric: "Industry concentration (HHI)"
      basis: hhi_industry
      direction: upper
      amber: 0.10
      red: 0.18
      owner: "Head of Credit Risk"
      breach_action: "Freeze new exposure growth in the top sector; table a diversification plan at the next Credit Committee."
      review_cycle: "Quarterly"
    - id: top_industry_share
      metric: "Top single-industry exposure share"
      basis: top_industry_share
      direction: upper
      amber: 0.20
      red: 0.30
      owner: "Head of Credit Risk"
      breach_action: "Review sector sub-limits; require Committee sign-off on further originations in the top sector."
      review_cycle: "Quarterly"
    - id: single_lender_share
      metric: "Largest single-lender exposure share"
      basis: top1_lender_share
      direction: upper
      amber: 0.10
      red: 0.15
      owner: "Head of Counterparty Risk"
      breach_action: "Re-underwrite the lender relationship; cap incremental volume and reassess guaranty reliance."
      review_cycle: "Quarterly"
    - id: top20_lender_share
      metric: "Top-20 lender exposure share"
      basis: top20_lender_share
      direction: upper
      amber: 0.45
      red: 0.60
      owner: "Head of Counterparty Risk"
      breach_action: "Broaden the originating-lender panel; set per-lender concentration sub-limits."
      review_cycle: "Quarterly"
    - id: portfolio_chargeoff_rate
      metric: "Portfolio charge-off rate (seasoned, count)"
      basis: portfolio_chargeoff_rate
      direction: upper
      amber: 0.12
      red: 0.16
      owner: "Chief Credit Officer"
      breach_action: "Tighten origination credit policy and pricing; escalate to the Board Risk Committee."
      review_cycle: "Quarterly"
    - id: vintage_deterioration
      metric: "Young-cohort early-MOB charge-off vs predecessors"
      basis: vintage_early_mob_multiple
      direction: upper
      amber: 1.25
      red: 1.50
      owner: "Head of Credit Risk"
      breach_action: "Investigate the deteriorating cohort's origination standards; pause comparable new lending pending review."
      review_cycle: "Quarterly"

# ---------------------------------------------------------------------------
# STRESS SCENARIO (CML-5) — stress -> limit review -> action
# ---------------------------------------------------------------------------
# APS 220 para 73 / APG 220 para 76. A simple, data-grounded scenario: take the
# charge-off experience of the financial-crisis cohorts (which the data already
# contains) as a stress multiplier and apply it to the current portfolio
# charge-off rate, then re-test against the CML-2 charge-off-rate limit. The
# point is the *linkage*: a stress result that breaches appetite triggers the
# limit's breach action (tighter origination / pricing), not a standalone number.
stress:
  # Approval-year cohorts whose realised charge-off experience defines the
  # crisis stress (the 2006-08 vintages charged off far above the book average).
  crisis_vintages: [2006, 2007, 2008]
  # Which appetite limit the stressed charge-off rate is tested against.
  chargeoff_limit_id: portfolio_chargeoff_rate
